<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 520" font-family="Segoe UI, -apple-system, sans-serif">
  <defs>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="112%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.08"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="10" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 3.5 L 0 7 z" fill="#94a3b8"/>
    </marker>
    <marker id="arrow-accent" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="10" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 3.5 L 0 7 z" fill="#6366f1"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="720" height="520" rx="12" fill="#f8fafc"/>

  <!-- Title -->
  <text x="360" y="36" text-anchor="middle" font-size="15" font-weight="600" fill="#334155" letter-spacing="0.5">Bot-The-Builder — Overview</text>

  <!-- ── Row 1: Teams ── -->
  <rect x="270" y="56" width="180" height="44" rx="22" fill="#dbeafe" stroke="#93c5fd" stroke-width="1" filter="url(#shadow)"/>
  <text x="360" y="83" text-anchor="middle" font-size="13.5" font-weight="600" fill="#1e40af">Microsoft Teams</text>

  <!-- Arrow 1→2 -->
  <line x1="360" y1="100" x2="360" y2="128" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ── Row 2: Bot Service ── -->
  <rect x="245" y="132" width="230" height="44" rx="10" fill="#fff7ed" stroke="#fdba74" stroke-width="1" filter="url(#shadow)"/>
  <text x="360" y="155" text-anchor="middle" font-size="13" font-weight="600" fill="#9a3412">Azure Bot Service</text>
  <text x="360" y="170" text-anchor="middle" font-size="10" fill="#c2410c">F0 · UserAssigned MSI</text>

  <!-- Arrow 2→3 -->
  <line x1="360" y1="176" x2="360" y2="204" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ── Row 3: Container App ingress ── -->
  <rect x="220" y="208" width="280" height="44" rx="10" fill="#f0fdf4" stroke="#86efac" stroke-width="1" filter="url(#shadow)"/>
  <text x="360" y="231" text-anchor="middle" font-size="13" font-weight="600" fill="#166534">Public Container App Ingress</text>
  <text x="360" y="246" text-anchor="middle" font-size="10" fill="#15803d">M365 Agents SDK · aiohttp :8000</text>

  <!-- ── VNet boundary ── -->
  <rect x="60" y="272" width="600" height="232" rx="10" fill="none" stroke="#cbd5e1" stroke-width="1.5" stroke-dasharray="6 4"/>
  <text x="80" y="292" font-size="11" font-weight="600" fill="#64748b">Shared Worker VNet</text>

  <!-- Arrow 3→VNet zone -->
  <line x1="360" y1="252" x2="360" y2="310" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="368" y="286" font-size="9.5" fill="#94a3b8" font-style="italic">VNet-backed environment</text>

  <!-- ── Row 4: Queue / Blob private endpoints ── -->
  <rect x="170" y="314" width="175" height="48" rx="10" fill="#ede9fe" stroke="#c4b5fd" stroke-width="1" filter="url(#shadow)"/>
  <text x="257" y="338" text-anchor="middle" font-size="13" font-weight="600" fill="#5b21b6">Queue PE</text>
  <text x="257" y="353" text-anchor="middle" font-size="10" fill="#7c3aed">botjobs</text>

  <rect x="375" y="314" width="175" height="48" rx="10" fill="#ede9fe" stroke="#c4b5fd" stroke-width="1" filter="url(#shadow)"/>
  <text x="462" y="338" text-anchor="middle" font-size="13" font-weight="600" fill="#5b21b6">Blob PE</text>
  <text x="462" y="353" text-anchor="middle" font-size="10" fill="#7c3aed">botstate</text>

  <text x="360" y="308" text-anchor="middle" font-size="10" fill="#94a3b8">Private Endpoints · no public access</text>

  <!-- Arrows from endpoints down to worker -->
  <line x1="257" y1="362" x2="257" y2="388" stroke="#94a3b8" stroke-width="1.5"/>
  <line x1="462" y1="362" x2="462" y2="388" stroke="#94a3b8" stroke-width="1.5"/>
  <!-- Horizontal connector -->
  <line x1="257" y1="388" x2="462" y2="388" stroke="#94a3b8" stroke-width="1.5"/>
  <!-- Vertical down to worker -->
  <line x1="360" y1="388" x2="360" y2="420" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Labels on arrows -->
  <text x="230" y="404" font-size="9" fill="#6366f1" font-style="italic">Polls queue</text>
  <text x="430" y="404" font-size="9" fill="#6366f1" font-style="italic">Results</text>

  <!-- ── Row 5: ACI Worker ── -->
  <rect x="220" y="424" width="280" height="56" rx="10" fill="#fef2f2" stroke="#fca5a5" stroke-width="1" filter="url(#shadow)"/>
  <text x="360" y="449" text-anchor="middle" font-size="13" font-weight="600" fill="#991b1b">ACI Worker</text>
  <text x="360" y="465" text-anchor="middle" font-size="10" fill="#b91c1c">PowerShell 7.6 · Az CLI · Bicep</text>
  <text x="360" y="477" text-anchor="middle" font-size="9.5" fill="#dc2626">Deploy / Teardown</text>
</svg>
